<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Menu</title>
    <style>
      :root {
        --page-gap: 14px;
      }
      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
        background: #f5f5f5;
      }
      header {
        padding: 12px 14px;
        background: white;
        position: sticky;
        top: 0;
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.08);
        z-index: 10;
      }
      header .row {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
      }
      header .small {
        opacity: 0.7;
        font-size: 14px;
      }
      #viewer {
        padding: var(--page-gap);
        max-width: 1100px;
        margin: 0 auto;
      }
      .page {
        background: white;
        border-radius: 12px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
        margin: 0 0 var(--page-gap) 0;
        overflow: hidden;
      }
      canvas {
        display: block;
        width: 100%;
        height: auto;
      }
      .error {
        color: #b00020;
        padding: 14px;
        background: #fff;
        border-radius: 12px;
      }
      a {
        color: inherit;
      }
      button {
        border: 1px solid #ddd;
        background: #fff;
        border-radius: 10px;
        padding: 8px 10px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="row">
        <div>
          <div><strong>Menu</strong></div>
          <div class="small" id="status">Chargement…</div>
        </div>
        <div class="row">
          <button id="rerender" type="button">Réadapter à l’écran</button>
          <a class="small" href="./menu.pdf">Ouvrir le PDF</a>
        </div>
      </div>
    </header>

    <main id="viewer"></main>

    <script type="module">
      // PDF.js via CDN
      import * as pdfjsLib from "https://unpkg.com/pdfjs-dist@5.4.530/build/pdf.mjs";
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://unpkg.com/pdfjs-dist@5.4.530/build/pdf.worker.mjs";

      const url = "./menu.pdf";
      const viewer = document.getElementById("viewer");
      const statusEl = document.getElementById("status");
      const rerenderBtn = document.getElementById("rerender");

      let pdf = null;
      let rendering = false;

      function setStatus(text) {
        statusEl.textContent = text;
      }
      function clearViewer() {
        viewer.innerHTML = "";
      }

      function showError(msg, err) {
        console.error(err || msg);
        viewer.innerHTML = `<div class="error"><strong>Erreur :</strong> ${msg}</div>`;
        setStatus("Erreur");
      }

      function debounce(fn, delay = 250) {
        let t;
        return (...args) => {
          clearTimeout(t);
          t = setTimeout(() => fn(...args), delay);
        };
      }

      function getScaleForPage(page) {
        // Scale pour que la page tienne en largeur dans le conteneur
        const containerWidth = Math.min(viewer.clientWidth, 1100);
        const viewportAt1 = page.getViewport({ scale: 1 });
        const scale = containerWidth / viewportAt1.width;

        // On évite les scales trop petits sur mobile
        return Math.max(scale, 1);
      }

      async function renderAllPages() {
        if (!pdf || rendering) return;
        rendering = true;

        try {
          clearViewer();
          setStatus(`Rendu des pages… (0 / ${pdf.numPages})`);

          for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
            const page = await pdf.getPage(pageNum);
            const scale = getScaleForPage(page);
            const viewport = page.getViewport({ scale });

            const pageWrap = document.createElement("div");
            pageWrap.className = "page";

            const canvas = document.createElement("canvas");
            const ctx = canvas.getContext("2d", { alpha: false });

            // Canvas en pixels réels
            canvas.width = Math.floor(viewport.width);
            canvas.height = Math.floor(viewport.height);

            pageWrap.appendChild(canvas);
            viewer.appendChild(pageWrap);

            await page.render({ canvasContext: ctx, viewport }).promise;

            setStatus(`Rendu des pages… (${pageNum} / ${pdf.numPages})`);
          }

          setStatus(`OK — ${pdf.numPages} page(s)`);
        } catch (err) {
          showError(
            "Impossible d’afficher le PDF. Vérifie que menu.pdf est bien au bon endroit.",
            err,
          );
        } finally {
          rendering = false;
        }
      }

      async function init() {
        try {
          setStatus("Téléchargement du PDF…");
          pdf = await pdfjsLib.getDocument({ url }).promise;
          await renderAllPages();
        } catch (err) {
          showError(
            "Chargement du PDF impossible (lien, nom de fichier, ou permissions).",
            err,
          );
        }
      }

      // ✅ Bouton manuel
      rerenderBtn.addEventListener("click", () => renderAllPages());

      // ✅ Fix iOS Safari portrait :
      // On NE rerender PAS sur resize (la barre d’adresse iOS déclenche resize pendant le scroll).
      // On rerender seulement en cas de rotation.
      window.addEventListener("orientationchange", () => {
        // on laisse Safari stabiliser les dimensions avant de recalculer
        setTimeout(() => renderAllPages(), 250);
      });

      // Si tu veux quand même gérer certains resizes (ex: split screen iPad),
      // décommente et ça ne rerendera que si la LARGEUR change vraiment :
      /*
    let lastWidth = window.innerWidth;
    window.addEventListener("resize", debounce(() => {
      const w = window.innerWidth;
      const widthChanged = Math.abs(w - lastWidth) > 5;
      lastWidth = w;
      if (widthChanged) renderAllPages();
    }, 250));
    */

      init();
    </script>
  </body>
</html>
